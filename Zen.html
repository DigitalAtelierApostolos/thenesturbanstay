<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Experience - The Nest Urban Stay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 50px 20px 30px 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO ΣΤΑΘΕΡΟ ΟΠΩΣ ΤΟ INDEX */
        .logo-container {
            width: 130px; height: 130px;
            margin-bottom: 25px; 
            border-radius: 18px;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-container img { 
            width: 120%; height: 160%; 
            object-fit: contain; filter: brightness(1.1);
        }

        .welcome-text { 
            font-weight: 300; letter-spacing: 2px; font-size: 0.75rem; 
            color: #d4af37; text-transform: uppercase; margin-bottom: 10px;
        }

        /* INTERACTIVE GRID ΓΙΑ ΤΗΝ ΚΑΡΤΑ */
        .grid-container { 
            width: 100%; display: flex; flex-direction: column; gap: 8px;
        }

        .action-strip {
            position: relative;
            height: 120px; /* Πιο κοντό από τα δωμάτια */
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; overflow: hidden; background-color: #111;
            border-bottom: 1px solid #222;
        }

        .action-strip i {
            position: relative; z-index: 3; font-size: 1.5rem;
            margin-bottom: 10px; color: #fff; opacity: 0.9;
        }

        .action-content {
            position: relative; z-index: 3; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .action-strip img {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.35; /* Πιο σκοτεινό για να διαβάζεται το κείμενο */
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .action-strip:hover img {
            opacity: 0.5; transform: scale(1.05);
        }

        .action-label {
            color: #fff; font-size: 0.9rem; font-weight: 300;
            letter-spacing: 4px; text-transform: uppercase;
        }

        /* WEATHER BUTTON - SPECIAL STYLE */
        .weather-btn {
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            border: 1px solid #333; height: 80px; margin-top: 10px;
        }

        /* FOOTER & SIGNATURE */
        .footer-section {
            padding: 60px 20px 40px 20px; text-align: center;
            margin-top: auto; display: flex; flex-direction: column; align-items: center;
        }

        .btn-club {
            display: inline-block; border: 1px solid #d4af37; color: #d4af37;
            padding: 15px 30px; text-decoration: none; font-size: 0.75rem;
            letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px;
            border-radius: 30px; transition: all 0.3s;
        }

        .btn-club:hover {
            background: #d4af37; color: #000;
        }

        .credits {
            font-size: 0.55rem; color: #333; letter-spacing: 2px;
            text-transform: uppercase; text-decoration: none; margin-top: 20px;
        }

        .credits strong { color: #555; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <div class="logo-container">
                <img src="assets/TheNestUrbanStay_logo.png" alt="The Nest">
            </div>
            <div class="welcome-text">Welcome to your Urban Nest</div>
        </header>

        <div class="grid-container">
            <a href="#wifi-link" class="action-strip">
                <img src="assets/wifi_bg.jpg" alt="Wi-Fi"> <div class="action-content">
                    <i class="fas fa-wifi"></i>
                    <span class="action-label">Connect to Wi-Fi</span>
                </div>
            </a>

            <a href="#manual-link" class="action-strip">
                <img src="assets/manual_bg.jpg" alt="Manual">
                <div class="action-content">
                    <i class="fas fa-book-open"></i>
                    <span class="action-label">House Manual</span>
                </div>
            </a>

            <a href="#guide-link" class="action-strip">
                <img src="assets/guide_bg.jpg" alt="Local Guide">
                <div class="action-content">
                    <i class="fas fa-map-marked-alt"></i>
                    <span class="action-label">Local Guide</span>
                </div>
            </a>

            <a href="https://www.meteo.gr/cf.cfm?city_id=10" class="action-strip weather-btn" target="_blank">
                <div class="action-content">
                    <i class="fas fa-cloud-sun"></i>
                    <span class="action-label" style="font-size: 0.7rem;">Karditsa Weather</span>
                </div>
            </a>
        </div>

        <div class="footer-section">
            <a href="club.html" class="btn-club">JOIN THE NEST CLUB</a>
            
            <a href="https://digitalatelier.gr" class="credits" target="_blank">
                Designed by <strong>Digital Atelier</strong>
            </a>
        </div>
    </div>

</body>
</html>
