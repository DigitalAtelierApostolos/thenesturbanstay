<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Experience - The Nest Urban Stay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 50px 20px 30px 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO ΜΕ LINK ΣΤΟ INDEX */
        .logo-container {
            width: 130px; height: 130px;
            margin-bottom: 25px; 
            border-radius: 18px;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        .logo-container img { 
            width: 120%; height: 160%; 
            object-fit: contain; filter: brightness(1.1);
        }

        .welcome-text { 
            font-weight: 300; letter-spacing: 2px; font-size: 0.75rem; 
            color: #999; text-transform: uppercase; margin-bottom: 10px;
        }

        /* GRID ΓΙΑ ΤΑ ΚΟΥΜΠΙΑ ΧΩΡΙΣ ΦΩΤΟΓΡΑΦΙΕΣ */
        .grid-container { 
            width: 100%; display: flex; flex-direction: column; gap: 5px;
        }

        .action-strip {
            position: relative;
            height: 130px; 
            width: 100%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; overflow: hidden; 
            background-color: #000; /* Μαύρο φόντο όπως το index */
        }

        .action-content {
            position: relative; z-index: 3; text-align: center;
            display: flex; flex-direction: column; align-items: center;
        }

        .action-content i {
            font-size: 1.2rem;
            margin-bottom: 12px; 
            color: #d4af37; /* Χρυσό εικονίδιο για premium αίσθηση */
            transition: all 0.4s ease;
        }

        .action-label {
            color: #fff; 
            font-size: 1.1rem; 
            font-weight: 300;
            letter-spacing: 6px; /* Ίδιο spacing με το index */
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        /* HOVER ΕΦΕ ΣΤΑ ΓΡΑΜΜΑΤΑ (ΑΠΟ ΤΟ INDEX) */
        .action-strip:hover .action-label {
            letter-spacing: 10px;
            font-weight: 400;
        }

        .action-strip:hover i {
            transform: scale(1.2);
            color: #fff;
        }

        /* FOOTER & SIGNATURE */
        .footer-section {
            padding: 60px 20px 40px 20px; text-align: center;
            margin-top: auto; display: flex; flex-direction: column; align-items: center;
        }

        .btn-club {
            display: inline-block; border: 1px solid #d4af37; color: #d4af37;
            padding: 18px 36px; text-decoration: none; font-size: 0.8rem;
            letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px;
            border-radius: 30px; transition: all 0.3s;
        }

        .btn-club:hover {
            background: #d4af37; color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* DIGITAL ATELIER HOVER ΟΠΩΣ ΤΟ INDEX */
        .credits {
            font-size: 0.55rem;
            color: #222; 
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: 40px;
            transition: 0.5s;
        }

        .credits strong { 
            color: #333; 
            font-weight: 600;
        }

        .credits:hover {
            color: #666; /* Φωτίζει στο hover όπως το ζήτησες */
        }
        
        .credits:hover strong {
            color: #888;
        }

        .copyright-text {
            font-size: 0.5rem; color: #444; margin-top: 15px;
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* ΑΦΑΙΡΕΣΗ ΜΠΛΕ ΠΛΑΙΣΙΟΥ ΣΕ ΚΙΝΗΤΑ */
        input, a, button, div { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <a href="index.html" class="logo-container">
                <img src="assets/TheNestUrbanStay_logo.png" alt="The Nest">
            </a>
            <div class="welcome-text">Smart Living Experience</div>
        </header>

        <div class="grid-container">
            <a href="#wifi-link" class="action-strip">
                <div class="action-content">
                    <i class="fas fa-wifi"></i>
                    <span class="action-label">Wi-Fi Access</span>
                </div>
            </a>

            <a href="#manual-link" class="action-strip">
                <div class="action-content">
                    <i class="fas fa-book-open"></i>
                    <span class="action-label">House Manual</span>
                </div>
            </a>

            <a href="#guide-link" class="action-strip">
                <div class="action-content">
                    <i class="fas fa-map-marked-alt"></i>
                    <span class="action-label">Local Guide</span>
                </div>
            </a>

            <a href="https://www.meteo.gr/cf.cfm?city_id=10" class="action-strip" target="_blank">
                <div class="action-content">
                    <i class="fas fa-cloud-sun"></i>
                    <span class="action-label">Weather</span>
                </div>
            </a>
        </div>

        <div class="footer-section">
            <a href="club.html" class="btn-club">JOIN THE NEST CLUB</a>
            
            <a href="https://digitalatelier.gr" class="credits" target="_blank">
                Designed by <strong>Digital Atelier</strong>
            </a>

            <div class="copyright-text">
                &copy; 2026 THE NEST URBAN STAY.
            </div>
        </div>
    </div>

</body>
</html>
