<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Guide - The Nest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --gray: #1a1a1a;
        }

        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        /* HEADER */
        .nav-bar { 
            padding: 25px; 
            border-bottom: 1px solid var(--gray); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn-back { 
            color: var(--gold); 
            text-decoration: none; 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover { opacity: 0.7; }

        .page-title {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
        }

        /* GUIDE GRID - ΠΡΟΣΑΡΜΟΓΗ ΓΙΑ PC/LAPTOP */
        .guide-container {
            max-width: 1000px; /* Περιορισμός πλάτους για μεγάλες οθόνες */
            margin: 40px auto;
            padding: 0 20px;
        }

        .guide-grid { 
            display: grid; 
            grid-template-columns: 1fr; /* 1 στήλη στο κινητό */
            gap: 15px; 
        }

        /* Tablet & PC View */
        @media (min-width: 768px) {
            .guide-grid {
                grid-template-columns: 1fr 1fr; /* 2 στήλες σε laptop */
            }
        }

        .guide-item { 
            background: #000; 
            padding: 50px 30px; 
            text-decoration: none; 
            color: #fff;
            border: 1px solid var(--gray);
            border-radius: 4px;
            transition: all 0.4s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
        }

        .guide-item i { 
            color: var(--gold); 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
        }

        .guide-label { 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            font-weight: 300;
            margin-bottom: 8px;
        }

        .guide-subtext {
            font-size: 0.55rem;
            color: #555;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* HOVER EFFECTS */
        .guide-item:hover { 
            background: #0d0d0d; 
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .guide-item:hover .guide-label { 
            color: var(--gold); 
            letter-spacing: 6px; 
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="#" onclick="goBack()" class="btn-back">← BACK</a>

<script>
function goBack() {
    // Αν υπάρχει ιστορικό στο πρόγραμμα περιήγησης, πήγαινε πίσω
    if (document.referrer.includes(window.location.hostname)) {
        window.history.back();
    } else {
        // Αν ο πελάτης άνοιξε το link απευθείας, στείλε τον στην κεντρική
        window.location.href = "index.html";
    }
}
</script>
        <span class="page-title">Local Guide</span>
    </div>

    <div class="guide-container">
        <div class="guide-grid">
            
            <a href="https://www.google.com/maps/search/coffee+brunch+karditsa" target="_blank" class="guide-item">
                <i class="fas fa-coffee"></i>
                <span class="guide-label">Coffee & Brunch</span>
                <span class="guide-subtext">The best spots for your morning</span>
            </a>

            <a href="https://www.google.com/maps/search/restaurants+karditsa" target="_blank" class="guide-item">
                <i class="fas fa-utensils"></i>
                <span class="guide-label">Dining</span>
                <span class="guide-subtext">Local flavors & fine dining</span>
            </a>

            <a href="https://www.google.com/maps/search/sightseeing+karditsa" target="_blank" class="guide-item">
                <i class="fas fa-camera-retro"></i>
                <span class="guide-label">Sightseeing</span>
                <span class="guide-subtext">Explore the city landmarks</span>
            </a>

            <a href="https://www.google.com/maps/search/pharmacies+karditsa" target="_blank" class="guide-item">
                <i class="fas fa-first-aid"></i>
                <span class="guide-label">Pharmacies</span>
                <span class="guide-subtext">Nearby medical assistance</span>
            </a>

        </div>
    </div>

</body>
</html>
