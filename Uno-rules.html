<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Rules - The Nest Urban Stay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER & BACK BUTTON */
        .nav-bar {
            width: 100%; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }
        .btn-back {
            color: #d4af37; text-decoration: none; font-size: 0.7rem;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* LANGUAGE SELECTOR */
        .lang-selector {
            display: flex; gap: 20px; margin: 30px 0;
        }
        .lang-btn {
            background: none; border: 1px solid #333; color: #555;
            padding: 8px 20px; border-radius: 20px; cursor: pointer;
            font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s;
        }
        .lang-btn.active {
            border-color: #d4af37; color: #d4af37;
        }

        /* IMAGE DISPLAY */
        .rules-container {
            width: 100%; max-width: 500px; padding: 0 10px;
        }
        .rules-img {
            width: 100%; height: auto; display: none; /* Κρυμμένες αρχικά */
            border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .rules-img.active { display: block; } /* Εμφανίζεται μόνο η ενεργή */

    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="#" onclick="goBack()" class="btn-back">← BACK</a>

<script>
function goBack() {
    // Αν υπάρχει ιστορικό στο πρόγραμμα περιήγησης, πήγαινε πίσω
    if (document.referrer.includes(window.location.hostname)) {
        window.history.back();
    } else {
        // Αν ο πελάτης άνοιξε το link απευθείας, στείλε τον στην κεντρική
        window.location.href = "index.html";
    }
}
</script>
        <span style="font-size: 0.6rem; letter-spacing: 2px; color: #333;">HOUSE RULES</span>
    </div>

    <div class="lang-selector">
        <button class="lang-btn active" onclick="showLang('gr', this)">ΕΛΛΗΝΙΚΑ</button>
        <button class="lang-btn" onclick="showLang('en', this)">ENGLISH</button>
    </div>

    <div class="rules-container">
        <img id="rules-gr" src="house-rules/uno-rules-gr.png" alt="Rules Greek" class="rules-img active">
        <img id="rules-en" src="house-rules/uno-rules-en.png" alt="Rules English" class="rules-img">
    </div>

    <script>
        function showLang(lang, btn) {
            // Αλλαγή εικόνας
            document.querySelectorAll('.rules-img').forEach(img => img.classList.remove('active'));
            document.getElementById('rules-' + lang).classList.add('active');

            // Αλλαγή στυλ στα κουμπιά
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

</body>
</html>
