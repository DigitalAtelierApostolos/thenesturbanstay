<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest | Urban Stay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 60px 20px 40px 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. ΣΤΑΘΕΡΟ ZOOM ΣΤΟ LOGO */
        .logo { 
            width: 160px; /* Μεγαλύτερο για να φαίνονται τα γράμματα */
            margin-bottom: 25px; 
            border-radius: 20px; /* Στρογγυλεμένες γωνίες */
            filter: brightness(1.1); 
            background-color: #fff;
            padding: 10px; /* Λίγος αέρας γύρω */
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            object-fit: contain;
            transition: 0.3s; /* Για ομαλή φόρτωση */
        }

        .main-title { 
            font-weight: 300; 
            letter-spacing: 2px; 
            font-size: 0.7rem; 
            color: #999; 
            text-transform: uppercase; 
            line-height: 1.6;
            max-width: 90%;
        }

        /* RESIDENCE GRID */
        .grid-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
        }

        .room-strip {
            position: relative;
            height: 170px; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            overflow: hidden;
            background-color: #000;
        }

        .room-strip img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .room-strip:hover img {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .room-label {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .room-strip:hover .room-label {
            letter-spacing: 10px;
            font-weight: 400;
        }

        /* FOOTER & CLUB */
        .footer-section {
            padding: 60px 20px 30px 20px;
            text-align: center;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. CLUB BUTTON ME ΣΤΡΟΓΓΥΛΕΜΕΝΕΣ ΑΚΡΕΣ */
        .btn-club {
            display: inline-block;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 18px 36px;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            
            border-radius: 30px; /* Η ΣΤΡΟΓΓΥΛΕΜΕΝΗ ΑΚΡΗ ΠΟΥ ΖΗΤΗΣΕΣ */
            
            transition: all 0.3s;
        }

        .btn-club:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* 3. ΔΙΑΚΡΙΤΙΚΟ HYPERLINK */
        .credits {
            font-size: 0.65rem;
            color: #333; /* Πολύ σκούρο γκρι για να είναι σχεδόν "κρυφό" */
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none; /* Χωρίς υπογράμμιση */
            transition: 0.3s;
        }

        .credits strong { 
            color: #444; 
            font-weight: 600;
        }

        .credits:hover { 
            color: #888; /* Φωτίζει μόνο στο hover */
        }
        
        .credits:hover strong {
            color: #aaa;
        }

        .copyright-text {
            font-size: 0.55rem;
            color: #222;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <img src="assets/logo.png" alt="The Nest" class="logo">
            <div class="main-title">Smart Living for Digital Nomads & Urban Explorers</div>
        </header>

        <div class="grid-container">
            <a href="zen.html" class="room-strip">
                <img src="assets/zen.jpg" alt="ZEN">
                <span class="room-label">ZEN</span>
            </a>
            <a href="uno.html" class="room-strip">
                <img src="assets/uno.jpg" alt="UNO">
                <span class="room-label">UNO</span>
            </a>
            <a href="studio47.html" class="room-strip">
                <img src="assets/studio47.jpg" alt="STUDIO 47">
                <span class="room-label">STUDIO 47</span>
            </a>
            <a href="comfort.html" class="room-strip">
                <img src="assets/comfort.jpg" alt="COMFORT">
                <span class="room-label">COMFORT</span>
            </a>
        </div>

        <div class="footer-section">
            <a href="club.html" class="btn-club">JOIN THE NEST CLUB</a>
            
            <a href="https://your-agency-site.com" class="credits" target="_blank">
                Powered by <strong>Digital Atelier</strong>
            </a>
            
            <div class="copyright-text">
                &copy; 2026 THE NEST URBAN STAY. ALL RIGHTS RESERVED.
            </div>
        </div>
    </div>

</body>
</html>
