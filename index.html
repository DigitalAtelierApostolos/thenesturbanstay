    <meta charset="UTF-8">

    <title>The Nest Urban Stay</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 50px 20px 40px 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1 & 2. ΠΙΟ ΜΙΚΡΟ LOGO ΜΕ ΕΣΩΤΕΡΙΚΟ ZOOM */
        .logo-container {
            width: 130px; /* Πιο μικρό μέγεθος πλαισίου */
            height: 130px; /* Τετράγωνο πλαίσιο */
            margin-bottom: 25px; 
            border-radius: 18px; /* Στρογγυλεμένες γωνίες */
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            
            overflow: hidden; /* Κρύβει ό,τι βγαίνει έξω από το πλαίσιο */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img { 
            width: 120%; /* ΖΟΥΜ ΣΤΗ ΦΩΤΟΓΡΑΦΙΑ (160% αντί για 100%) */
            height: 160%; 
            object-fit: contain; /* Για να μην παραμορφώνεται */
            filter: brightness(1.1);
        }

        .main-title { 
            font-weight: 300; 
            letter-spacing: 2px; 
            font-size: 0.7rem; 
            color: #999; 
            text-transform: uppercase; 
            line-height: 1.6;
            max-width: 90%;
        }

        /* RESIDENCE GRID */
        .grid-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
        }

        .room-strip {
            position: relative;
            height: 170px; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            overflow: hidden;
            background-color: #000;
        }

        .room-strip img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .room-strip:hover img {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .room-label {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .room-strip:hover .room-label {
            letter-spacing: 10px;
            font-weight: 400;
        }

        /* FOOTER & CLUB */
        .footer-section {
            padding: 80px 20px 40px 20px;
            text-align: center;
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-club {
            display: inline-block;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 18px 36px;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            border-radius: 30px; 
            transition: all 0.3s;
        }

        .btn-club:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* 3. MINIMAL MENU (Σαν το Pelion Esties) */
        .bottom-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.65rem;
            color: #555; /* Διακριτικό γκρι */
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .bottom-nav a {
            color: #555;
            text-decoration: none;
            transition: 0.3s;
        }

        .bottom-nav a:hover {
            color: #888;
        }

        .separator {
            color: #333;
        }

        /* ΤΟ ΣΧΕΔΟΝ ΚΡΥΦΟ LINK ΣΟΥ */
        .credits {
            font-size: 0.55rem;
            color: #222; /* Πολύ σκούρο, σχεδόν σβησμένο */
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: 40px;
            transition: 0.5s;
        }

        .credits strong { 
            color: #333; 
            font-weight: 600;
        }

        .credits:hover {
            color: #666;
        }
        
        .credits:hover strong {
            color: #888;
        }

        .copyright-text {
            font-size: 0.5rem;
            color: #444;
            margin-top: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

    </style>
</head>
