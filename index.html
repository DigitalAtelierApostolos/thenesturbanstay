<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest | Urban Stay</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px; 
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { 
            padding: 60px 20px 40px 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo { 
            width: 120px; 
            margin-bottom: 25px; 
            border-radius: 18px;
            filter: brightness(1.1); 
            background-color: #fff;
            padding: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-title { 
            font-weight: 300; 
            letter-spacing: 2px; 
            font-size: 0.7rem; 
            color: #999; 
            text-transform: uppercase; 
            line-height: 1.6;
            max-width: 90%;
        }

        /* RESIDENCE GRID */
        .grid-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
        }

        .room-strip {
            position: relative;
            height: 170px; 
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            overflow: hidden;
            background-color: #000;
        }

        /* ΕΦΕ ΦΩΤΟΓΡΑΦΙΑΣ */
        .room-strip img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            transform: scale(1); /* Αρχικό μέγεθος */
        }

        /* HOVER & ACTIVE EFFECTS */
        .room-strip:hover img {
            opacity: 0.7;
            transform: scale(1.1); /* To Zoom που ζήτησες */
        }

        .room-label {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }

        .room-strip:hover .room-label {
            letter-spacing: 10px; /* Μεγαλώνουν τα γράμματα οπτικά */
            font-weight: 400;
        }

        /* FOOTER & CLUB */
        .footer-section {
            padding: 60px 20px 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .btn-club {
            display: inline-block;
            border: 1px solid #d4af37; /* Χρυσό περίγραμμα για να ταιριάζει με το logo */
            color: #d4af37;
            padding: 16px 32px;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            transition: 0.3s;
        }

        .btn-club:hover {
            background: #d4af37;
            color: #000;
        }

        .credits {
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
        }

        .credits strong { color: #666; }
        .credits:hover { color: #888; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <header>
            <img src="assets/TheNestUrbanStay_logo.png" alt="The Nest Urban Stay" class="logo">
            <div class="main-title">Smart Living for Digital Nomads & Urban Explorers</div>
        </header>

        <div class="grid-container">
            <a href="zen.html" class="room-strip">
                <img src="assets/Zen.jpg" alt="ZEN">
                <span class="room-label">ZEN</span>
            </a>
            <a href="uno.html" class="room-strip">
                <img src="assets/Uno.jpg" alt="UNO">
                <span class="room-label">UNO</span>
            </a>
            <a href="studio47.html" class="room-strip">
                <img src="assets/Studio_47.jpg" alt="STUDIO 47">
                <span class="room-label">STUDIO 47</span>
            </a>
            <a href="comfort.html" class="room-strip">
                <img src="assets/Comfort.jpg" alt="COMFORT">
                <span class="room-label">COMFORT</span>
            </a>
        </div>

        <div class="footer-section">
            <a href="club.html" class="btn-club">JOIN THE NEST CLUB</a>
            <br>
            <a href="https://your-agency-site.com" class="credits" target="_blank">
                Powered by <strong>Digital Atelier</strong>
            </a>
        </div>
    </div>

</body>
</html>
