<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest Club | Join Now</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .club-wrapper {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px auto;
            border-radius: 18px;
            background: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-box img {
            width: 120%; 
            height: 160%; 
            object-fit: contain;
            filter: brightness(1.1);
        }

        .logo-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .logo-link:hover {
            transform: scale(1.05);
        }

        h1 { 
            font-weight: 200; 
            letter-spacing: 3px; 
            font-size: 1.3rem; 
            margin-bottom: 10px;
            color: #d4af37;
            text-transform: uppercase;
        }

        /* ΠΙΟ ΦΩΤΕΙΝΟ ΚΕΙΜΕΝΟ ΠΕΡΙΓΡΑΦΗΣ */
        p { 
            font-size: 0.85rem; 
            color: #bbb; /* Από #666 σε #bbb για φωτεινότητα */
            margin-bottom: 35px;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background: #151515;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 15px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            background: #1a1a1a;
        }

        .btn-send {
            background: #d4af37;
            color: #000;
            padding: 20px;
            border-radius: 30px;
            border: 1px solid #d4af37;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-send:hover {
            background: transparent;
            color: #d4af37;
            transform: scale(0.98);
        }

        .back-home {
            margin-top: 40px;
            display: inline-block;
            font-size: 0.65rem;
            color: #666; /* Πιο φωτεινό από το #333 */
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .back-home:hover {
            color: #d4af37;
        }

        /* ΑΦΑΙΡΕΣΗ ΜΠΛΕ ΠΛΑΙΣΙΟΥ */
        input, a, button, div {
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        input:focus, a:focus, button:focus {
            outline: none !important;
        }

        /* ΠΙΟ ΦΩΤΕΙΝΟΣ ΑΣΤΕΡΙΣΚΟΣ */
        .disclaimer {
            margin-top: 15px !important;
            font-size: 0.7rem !important; 
            color: #888 !important; /* Από #444 σε #888 */
            letter-spacing: 0.5px;
            line-height: 1.4;
            font-style: italic;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #ff4444;
        }

    </style>
</head>
<body>

    <div class="club-wrapper">
        <a href="index.html" class="logo-link">
            <div class="logo-box">
                <img src="assets/TheNestUrbanStay_logo.png" alt="The Nest Urban Stay">
            </div>
        </a>

        <h1>Unlock 10% Off</h1>
        <p>Γίνετε μέλος του club και λάβετε τον κωδικό έκπτωσης για την επόμενη κράτησή σας.</p>

          <form name="nest-club" method="POST" data-netlify="true" action="/success.html">
    <input type="text" name="name" placeholder="Ονοματεπώνυμο" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="Τηλέφωνο (Προαιρετικά)">
    
    <button type="submit" class="btn-send">JOIN THE CLUB</button>

    <p class="disclaimer">
        * Θα λάβετε ένα email με την ψηφιακή κάρτα μέλους και τον κωδικό έκπτωσης.
    </p>
          </form>

        <a href="index.html" class="back-home">Back to Residence Hub</a>
    </div>

</body>
</html>
