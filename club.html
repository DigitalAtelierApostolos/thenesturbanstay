<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Nest Club | Join Now</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .club-wrapper {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        /* Η ΦΩΤΟΓΡΑΦΙΑ ΜΕ ΤΟ ZOOM ΠΟΥ ΕΙΠΑΜΕ */
        .logo-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px auto;
            border-radius: 18px;
            background: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-box img {
            width: 120%; /* ΖΟΥΜ ΣΤΗ ΦΩΤΟΓΡΑΦΙΑ (120% αντί για 100%) */
            height: 160%; 
            object-fit: contain; /* Για να μην παραμορφώνεται */
            filter: brightness(1.1);
        }

        .logo-link {
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .logo-link:hover {
            transform: scale(1.05); /* Ένα μικρό "ζωντανό" εφέ όταν το πατάς */
        }

        h1 { 
            font-weight: 200; 
            letter-spacing: 3px; 
            font-size: 1.3rem; 
            margin-bottom: 10px;
            color: #d4af37;
            text-transform: uppercase;
        }

        p { 
            font-size: 0.8rem; 
            color: #666; 
            margin-bottom: 35px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input {
            background: #151515;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 15px; /* Στρογγυλεμένες γωνίες logo */
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        input:focus {
            border-color: #d4af37;
            background: #1a1a1a;
        }

        .btn-send {
            background: #d4af37;
            color: #000;
            padding: 20px;
            border-radius: 30px; /* Capsule style */
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .back-home {
            margin-top: 40px;
            display: inline-block;
            font-size: 0.6rem;
            color: #333;
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .back-home:hover {
            color: #d4af37;
            border-bottom: 1px solid #d4af37;
        }

    </style>
</head>
<body>

    <div class="club-wrapper">
        <div class="logo-box">
            <a href="index.html" class="logo-link">
            <img src="assets/TheNestUrbanStay_logo.png" alt="The Nest Urban Stay"></a>
        </div>

        <h1>Unlock 10% Off</h1>
        <p>Γίνετε μέλος του club και λάβετε τον κωδικό έκπτωσης για την επόμενη κράτησή σας.</p>

        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <input type="text" name="name" placeholder="Ονοματεπώνυμο" required>
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" class="btn-send">ΛΗΨΗ ΚΩΔΙΚΟΥ</button>
        </form>

        <a href="index.html" class="back-home">Back to Residence Hub</a>
    </div>

</body>
</html>
