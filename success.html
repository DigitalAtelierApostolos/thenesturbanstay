<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - The Nest</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            margin: 0; 
        }
        .content { padding: 20px; max-width: 350px; }
        
        h1 { 
            color: #d4af37; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 1.1rem; 
            font-weight: 300;
            margin-bottom: 20px;
        }
        
        p { 
            color: #888; 
            font-size: 0.85rem; 
            line-height: 1.6; 
            letter-spacing: 1px;
            margin-bottom: 40px; 
        }

        .btn-back { 
            border: 1px solid #d4af37; 
            color: #d4af37; 
            text-decoration: none; 
            padding: 15px 40px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }
        
        .btn-back:hover { 
            background: #d4af37; 
            color: #000; 
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Σας ευχαριστούμε πολύ</h1>
        <p>Η εγγραφή σας ολοκληρώθηκε. Θα λάβετε σύντομα ένα email με την ψηφιακή κάρτα μέλους και τον κωδικό έκπτωσης.</p>
        <a href="index.html" class="btn-back">Επιστροφη</a>
    </div>
</body>
</html>
